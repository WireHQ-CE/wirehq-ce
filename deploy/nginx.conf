# Preserve the original request scheme end-to-end. TLS terminates at the edge (the user's
# HAProxy/nginx) which forwards over HTTP with X-Forwarded-Proto: https; honour that when present,
# otherwise fall back to this server's own scheme (e.g. plain http://localhost:28173 locally). The API
# reads it (UseForwardedHeaders) to mark the refresh cookie Secure + redirect correctly under HTTPS.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (the SPA ships its own CSP). The same policy serves local http://localhost:28173
    # and production https://wirehq.net — it's origin-relative plus the Cloudflare Turnstile origin.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Turnstile loads a script from + renders an iframe + posts to challenges.cloudflare.com.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://challenges.cloudflare.com; script-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Proxy API calls to the backend so the SPA and API share an origin.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Dynamic sitemap — served from the API (built from the published CMS pages) at the canonical root path.
    location = /sitemap.xml {
        proxy_pass http://api:8080/api/v1/content/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # SPA fallback: client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
