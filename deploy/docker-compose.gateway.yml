# WireHQ Community Edition — the optional co-located "WireHQ Gateway" (docs: README § Gateway).
#
# Adds a gateway container — the outbound-only mTLS agent + WireGuard — next to the control plane,
# and enables the API's agent gateway (its mTLS listener) with the certificate from
# deploy/gateway-cert.sh. One-time flow:
#
#   ./deploy/gateway-cert.sh [public-host-or-ip]     # once; SANs must cover what agents dial
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.gateway.yml up -d --build
#   → mint a token in the app (WireGuard → Agents → Enroll agent), then:
#   WIREHQ_ENROLL_TOKEN=<token> docker compose -f deploy/docker-compose.yml \
#       -f deploy/docker-compose.gateway.yml up -d gateway
#   → bind an instance to the agent (Instance → Deployment → Agent) and Deploy.
#
# The gateway applies config INSIDE its own container: the host kernel's WireGuard module when
# available (the kernel is shared), else the bundled userspace wireguard-go — either way it needs
# only NET_ADMIN + /dev/net/tun, no WireGuard install on the host. To run the tunnels in the HOST's
# network namespace instead (host-mode), give the gateway `network_mode: host` and set
# WIREHQ_SERVER=https://localhost:28443 (the published gateway port) — the wg interface then lives
# on the host itself.
#
# Reachability reminder: peers must reach ${WG_PORT:-51820}/udp on this machine (public IP or a
# router port-forward). The container changes the management story, not the networking one.

services:
  api:
    environment:
      AgentGateway__Enabled: "true"
      AgentGateway__Port: "28443"
      AgentGateway__ServerCertificatePath: /certs/gateway.pfx
      AgentGateway__ServerCertificatePassword: ""
    volumes:
      - ./certs:/certs:ro
    ports:
      # Published for REMOTE agents on other machines (mTLS; safe to expose — clients must hold an
      # org-CA client certificate). The co-located gateway below reaches it over the compose network.
      - "${AGENT_GATEWAY_BIND:-0.0.0.0}:${AGENT_GATEWAY_PORT:-28443}:28443"

  gateway:
    build:
      context: ../agent
    image: wirehq-ce-gateway:local
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.src_valid_mark: 1
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    environment:
      WIREHQ_SERVER: https://api:28443
      # Required on FIRST boot only (single-use; the identity persists in the volume).
      WIREHQ_ENROLL_TOKEN: ${WIREHQ_ENROLL_TOKEN:-}
      WIREHQ_AGENT_NAME: ${WIREHQ_AGENT_NAME:-gateway-in-a-box}
      # Trust the self-signed gateway certificate (Go honors SSL_CERT_FILE).
      SSL_CERT_FILE: /certs/gateway.crt
    volumes:
      - gateway-state:/var/lib/wirehq-agent
      - ./certs:/certs:ro
    depends_on:
      - api

volumes:
  gateway-state:
